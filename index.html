<div class="cis-side-card">
  <style>
    .cis-side-card{
      --brand:#9f283b;
      --brand-dark:#7e2230;
      --ink:#2f2c2d;
      --muted:#5d5759;
      --line:#e4dde0;
      --soft:#faf7f8;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--ink);
      width:100%;
      max-width:320px;
      margin:0 auto 14px;
    }
    .cis-side-card *{box-sizing:border-box}
    .cis-side-panel{
      border:1px solid var(--line);
      border-top:6px solid var(--brand);
      background:linear-gradient(180deg,#fff,#fbf8f9);
      box-shadow:0 8px 20px rgba(55,37,41,.07);
      padding:16px 15px;
    }
    .cis-side-kicker{
      margin:0 0 7px;
      color:var(--brand);
      font-size:.72rem;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      line-height:1.35;
    }
    .cis-side-title{
      margin:0 0 8px;
      font-family:Georgia, "Times New Roman", serif;
      font-size:1.18rem;
      line-height:1.18;
      color:#2e2b2c;
    }
    .cis-side-text{
      margin:0 0 13px;
      color:var(--muted);
      font-size:.9rem;
      line-height:1.45;
    }
    .cis-side-link{
      display:block;
      width:100%;
      padding:10px 12px;
      background:var(--brand);
      color:#fff !important;
      text-align:center;
      text-decoration:none !important;
      font-size:.92rem;
      font-weight:700;
      line-height:1.25;
      border-radius:999px;
      box-shadow:0 8px 16px rgba(159,40,59,.16);
    }
    .cis-side-link:hover,
    .cis-side-link:focus{
      background:var(--brand-dark);
      color:#fff !important;
    }
    @media (max-width:680px){
      .cis-side-card{max-width:none}
    }
  </style>

  <div class="cis-side-panel">
    <p class="cis-side-kicker">Recordatorio</p>
    <h3 class="cis-side-title">Aprobación del CIS</h3>
    <p class="cis-side-text">Consultá las condiciones y actividades necesarias para aprobar el Curso Inicial de Socialización.</p>
    <a class="cis-side-link" href="recordatorio_cis_1.html" target="_blank" rel="noopener">Ver condiciones</a>
  </div>
</div>
